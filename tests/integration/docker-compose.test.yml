version: '3.8'

services:
  # PostgreSQL for Ingestion & Analysis services (TimescaleDB)
  postgres:
    image: postgres:16-alpine
    container_name: springlens-postgres-test
    environment:
      POSTGRES_DB: springlens_test
      POSTGRES_USER: springlens
      POSTGRES_PASSWORD: testpass123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springlens"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./schemas/migrations:/docker-entrypoint-initdb.d
    networks:
      - test-network

  # TimescaleDB for hypertable support (if needed separately)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: springlens-timescaledb-test
    environment:
      POSTGRES_DB: springlens_timescale
      POSTGRES_USER: springlens
      POSTGRES_PASSWORD: testpass123
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springlens"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Redis for deduplication cache
  redis:
    image: redis:7-alpine
    container_name: springlens-redis-test
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: springlens-zookeeper-test
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: springlens-kafka-test
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9093:9093"
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - test-network

  # Kafka UI for debugging (optional)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: springlens-kafka-ui-test
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: test
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
