spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/springlens_auth}
    username: ${DB_USER:springlens}
    password: ${DB_PASSWORD:springlens_dev}

springlens:
  jwt:
    secret: local-dev-secret-that-is-at-least-32-chars!
    issuer: http://localhost:8084
  github:
    client-id: ${GITHUB_CLIENT_ID:dev-client-id}
    client-secret: ${GITHUB_CLIENT_SECRET:dev-client-secret}
  internal:
    allowed-cidr: 127.0.0.1/32

logging:
  level:
    io.springlens: DEBUG
    org.springframework.security: DEBUG
